name: Android CI

on:
  pull_request:
    branches: [ "master", "develop" ]
  push:
    branches: [ "master", "develop" ]

jobs:
  static-analysis:
    name: Análise Estática
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17 (Zulu)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Run Detekt
        run: ./gradlew detekt

      - name: Setup Reviewdog
        if: github.event_name == 'pull_request'
        uses: reviewdog/action-setup@v1
        with:
          reviewdog_version: latest

      - name: Post Detekt annotations via Reviewdog
        if: github.event_name == 'pull_request'
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          find . -path "*/build/reports/detekt/*.xml" -not -path "*detekt-all*" \
            | xargs cat \
            | reviewdog -f=checkstyle \
                -name="detekt" \
                -reporter=github-pr-review \
                -filter-mode=added \
                -fail-on-error=false

      - name: Run Lint
        run: ./gradlew lint

      - name: Upload Detekt report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: detekt-results
          path: '**/build/reports/detekt/detekt.html'

      - name: Upload Lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-results
          path: '**/build/reports/lint-results-debug.html'

  test:
    name: Testes e Cobertura
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17 (Zulu)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Run unit tests
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: ./gradlew testDebugUnitTest -PGEMINI_API_KEY=$GEMINI_API_KEY

      - name: Generate JaCoCo coverage report
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: ./gradlew jacocoTestReport jacocoFullReport -PGEMINI_API_KEY=$GEMINI_API_KEY

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: '**/build/reports/tests/testDebugUnitTest'

      - name: Verify screenshot goldens
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: ./gradlew verifyRoborazziDebug -PGEMINI_API_KEY=$GEMINI_API_KEY

      - name: Upload screenshot diffs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: roborazzi-diffs
          path: '**/build/outputs/roborazzi/**_compare.png'

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: build/reports/jacoco/full/jacocoFullReport.xml
          flags: unittests
          fail_ci_if_error: false

      - name: Upload JaCoCo XML
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-xml
          path: build/reports/jacoco/full/jacocoFullReport.xml

  coverage-gate:
    name: Coverage Gate
    runs-on: ubuntu-latest
    needs: [ test ]
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download JaCoCo XML
        uses: actions/download-artifact@v4
        with:
          name: jacoco-xml
          path: build/reports/jacoco/full/

      - name: Check coverage
        uses: madrapps/jacoco-report@v1.6.1
        with:
          paths: build/reports/jacoco/full/jacocoFullReport.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          min-coverage-overall: 60
          min-coverage-changed-files: 60
          title: Cobertura de Testes
          update-comment: true
          pass-emoji: ':green_circle:'
          fail-emoji: ':red_circle:'

